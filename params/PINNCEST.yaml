# PINNCEST Model Configuration (Cross-power Attention Spectral Evolution Network)

# --- Core Architecture Parameters ---
d_model: 128                 # Hidden dimension for CNN and Attention blocks 128-->256
nhead: 8                     # Number of heads for Self and Cross-Attention 8-->4
num_layers: 4                # Number of transformer layers per B1 stream 4-->5 [20260212]
fit_range: [-5, 5]           # Frequency offset range (ppm) for training/fitting

# --- CNN Feature Extractor ---
# The CNN handles the initial local peak detection
kernel_size: 3
padding: 1

# --- Regression & Pooling ---
# Shared FC and decoupled heads for f and k
# Higher hdim allows better separation of metabolite-specific exchange rates
shared_hdim_ratio: 0.25      # hdim // 4 as defined in code

# --- Training Parameters ---
dropout: 0.2
batch_size: 256              # Moderate batch size to stabilize Attention gradients 128-->256
epochs: 400                  # Attention-based models often benefit from longer training 800-->500
lr: 5e-4                     # Recommended starting LR for AdamW (use 1e-4 if using SGD) 5e-4 --> 1e-3
weight_decay: 1e-4           # Regularization to prevent overfitting on synthetic data 1e-4 --> 5e-3
f_w: 1
k_w: 1
z_loss_weight: 10            # [20260211] z_w used for grid search

# --- Visualization & Debug ---
plot: false                  # Enable matplotlib plotting every 10 epochs
debug: false
